services:
  grokcli-2api:
    build:
      context: .
      dockerfile: Dockerfile
    image: grokcli-2api:local
    container_name: grokcli-2api
    ports:
      - "3000:3000"
    environment:
      GROK2API_HOST: "0.0.0.0"
      GROK2API_PORT: "3000"
      GROK2API_OPEN_BROWSER: "0"
      # Optional:
      # GROK2API_ADMIN_PASSWORD: "change-me"
      # GROK2API_MOEMAIL_API_KEY: ""
      # GROK2API_MOEMAIL_BASE_URL: "https://moemail.521884.xyz"
      # GROK2API_MOEMAIL_DOMAIN: "lolicc.online"
      # GROK2API_XAI_PROXY: ""
    volumes:
      - ./data:/app/data
    restart: unless-stopped
